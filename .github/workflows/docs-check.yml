name: Docs Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install katvan from this checkout
        run: uv tool install .

      - name: Pull reference for all pull-reference siblings
        run: katvan pull --all
        # Siblings are NOT checked out in CI; pull will fail silently for any
        # binary not installed. That's acceptable here — reference content is
        # committed in-tree (refreshed by the reference-sync workflow).
        continue-on-error: true

      - name: Doctor — culture.dev IA health
        run: katvan doctor

      - uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: site

      - name: Build docs
        working-directory: site
        run: bundle exec jekyll build --config _config.base.yml,_config.culture.yml -d _site_culture --strict_front_matter
        env:
          JEKYLL_ENV: production

      - name: Install html-proofer
        # Installed standalone (not via Gemfile) so the Cloudflare Pages build
        # doesn't have to compile its native deps. CI is the only place we
        # need it.
        run: gem install --no-document html-proofer -v "~> 5.0"

      - name: Check internal links (advisory)
        # Warn-only for now: 3 vendored pages (attention, coverage-baseline,
        # architecture/shared-vs-cited) carry repo-relative paths from their
        # source repos; rewriting those belongs in the librarian import, not
        # here. Flip continue-on-error off once that lands.
        working-directory: site
        continue-on-error: true
        run: |
          htmlproofer _site_culture \
            --disable-external \
            --allow-hash-href \
            --ignore-files "/attention/index.html$/,/coverage-baseline/index.html$/,/architecture/shared-vs-cited/index.html$/"
