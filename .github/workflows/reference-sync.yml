name: Reference Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - run: uv python install 3.12

      - name: Install katvan + every pull-reference sibling binary
        run: |
          uv tool install .
          # Enumerate pull-reference repos from the registry so the list
          # stays in sync as the registry evolves.
          for repo in $(katvan overview --json | python3 -c "import json,sys; d=json.load(sys.stdin); print('\n'.join(e['id'] for cat in d['by_category'].values() for e in cat if e.get('docs_mode')=='pull-reference'))"); do
            # Try the canonical package name (== repo id) first; siblings whose
            # PyPI package name diverges (e.g. agentirc-cli for agentirc) will
            # be skipped, which is acceptable — they're either docs_mode: skip
            # already or their reference can't sync until packaging aligns.
            uv tool install "$repo" || echo "skipped: $repo not installable"
          done

      - name: Pull reference
        run: katvan pull --all --json | tee /tmp/pull.json

      - name: Clone agex-cli for SKILL.md sync
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: agentculture/agex-cli
          ref: main
          path: _agex-cli-src

      - name: Render agex commands from SKILL.md
        run: python3 scripts/sync_agex_skills.py _agex-cli-src

      - name: Open PR if anything changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain site/)" ]; then
            echo "No reference changes."
            exit 0
          fi
          BRANCH="reference-sync/$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git config user.name "katvan-bot"
          git config user.email "katvan-bot@users.noreply.github.com"
          git add site/
          git commit -m "chore(reference): nightly sync $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(reference): nightly sync $(date -u +%Y-%m-%d)" \
            --body "Auto-generated by reference-sync.yml. Review diff before merging." \
            --label "reference-sync"
