name: SonarCloud

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Promote a *presence flag* (not the secret itself) to job env so the
    # SonarCloud step can gate on it — `secrets.*` isn't allowed in `if:`.
    # The real SONAR_TOKEN is injected only at the scan step's env, keeping
    # it out of earlier steps (e.g. checkout) and reducing blast radius if a
    # step accidentally logs its environment.
    env:
      SONAR_TOKEN_PRESENT: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Sonar needs full git history for accurate "new code" blame attribution.
          fetch-depth: 0

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN_PRESENT == 'true'
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
