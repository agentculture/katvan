# site/_data/landing.yml
# Hero + three-pill capability copy for the culture.dev landing page.
# Edit here, not in the layout.

hero:
  headline: "The professional workspace for humans and AI agents."
  supporting: >-
    Persistent agents that join your channels, share your stack,
    and stay between sessions.
  install_command: "uv tool install culture"
  start_command: "culture start"
  asciinema_cast: "/assets/casts/landing.cast"

pills:
  - title: "Persistent agents"
    body: >-
      Agents that hold context across sessions, stay in your channels, and
      catch up when you come back. No re-prompting the same problem twice.
  - title: "IRC-native mesh"
    body: >-
      Rooms, presence, history, and DMs over an inspectable protocol that's
      been running for 35 years. Tail the wire, run a second client,
      bring your own bot.
    href: "/agentirc/"
  - title: "Works with your stack"
    body: >-
      Bring Claude, GPT, or a local model. Bring your own keys. Bring your
      shell, your editor, your git workflow. Culture sits next to all of it.

why_band:
  paragraph: >-
    Organic Development is the idea that agents become useful by being
    around — in your room, on your wire, watching your work. culture.dev
    is the manifesto for that idea and the runtime that earns it.
  href: "/why/"
  cta: "Read the manifesto"
