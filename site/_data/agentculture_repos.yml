# Schema:
#   id           (required) repo name within agentculture/, e.g. "agentirc"
#   category     (required) one of: core-runtime | workspace-experience |
#                  identity-secrets | resident-culture | resident-domain |
#                  org-site
#   maturity     (required) one of: placeholder | experimental | usable |
#                  deprecated
#   docs_mode    (required) how the librarian skill treats this repo's docs:
#                  pull-reference — katvan pull invokes the sibling's AFI
#                                   binary (learn --json, explain --json)
#                                   and writes site/docs/<id>/reference/.
#                                   Pick this when the sibling ships an
#                                   AFI-compatible CLI binary.
#                  pull           — librarian pull syncs the sibling's
#                                   narrative docs/ directory into
#                                   site/docs/<id>/. Pick this when the
#                                   sibling ships authored markdown but
#                                   no AFI binary.
#                  skip           — no automated sync. The per-repo page on
#                                   culture.dev is hand-authored end to end.
#                                   Pick this for daemons, services, or
#                                   repos without an AFI binary.
#   description  (required) one short sentence (<=140 chars) — what it is,
#                  not what it will be
#   package      (optional) PyPI package name. Set this only when the
#                  package name diverges from the repo id (e.g. agentirc
#                  → agentirc-cli). The reference-sync workflow installs
#                  `package` if set, else falls back to `id`.
#   binary       (optional) CLI binary name if applicable
#   docs         (optional) absolute URL — culture.dev page or repo README
#   site_path    (optional) the canonical katvan-site path for this repo,
#                  if it differs from `/<id>/`. Set this when a repo's
#                  docs live under a different slug (e.g. `agex-cli`'s
#                  docs live at `/agex/`). Templates fall back to
#                  `/<id>/` when this is unset.
#   install      (optional) one-line install command
#   caveat       (optional) one short sentence — a current public-facing
#                  limitation a reader should know about
#   related      (optional) list of other ids in this registry
#
# Adding a new sibling repo: append an entry following this schema.
# Registry hygiene (drift between this file and `gh repo list agentculture
# --visibility public`) is steward's remit; ghafi handles GitHub-side
# mechanics. There is no CI gate.

- id: agentirc
  category: core-runtime
  maturity: usable
  docs_mode: skip
  description: The IRC-native runtime for persistent AI agents and humans in shared rooms.
  package: agentirc-cli
  binary: agentirc
  docs: https://culture.dev/agentirc/
  install: uv tool install agentirc-cli
  caveat: Bot extension API still in phased rollout.
  related: [culture, irc-lens]

- id: irc-lens
  category: core-runtime
  maturity: experimental
  docs_mode: pull-reference
  description: Lens CLI for inspecting AgentIRC state and message flow.
  related: [agentirc]

- id: culture
  category: workspace-experience
  maturity: usable
  docs_mode: skip
  description: The integrated workspace — CLI, harnesses, console, mesh.
  package: culture
  binary: culture
  docs: https://culture.dev
  install: uv tool install culture
  caveat: "Reference sync deferred — `culture learn` does not yet support `--json`."

- id: cultureagent
  category: core-runtime
  maturity: usable
  docs_mode: pull-reference
  description: Per-backend agent harnesses that connect AI agents to the Culture IRC mesh.
  package: cultureagent
  binary: cultureagent
  install: uv tool install cultureagent
  related: [culture, agentirc]

- id: agex-cli
