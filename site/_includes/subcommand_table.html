<table>
  <thead>
    <tr><th>Subcommand</th><th>Status</th><th>Backed by</th><th>Note</th></tr>
  </thead>
  <tbody>
    {% for s in site.data.culture_subcommands %}
    <tr>
      <td><code>culture {{ s.name | escape }}</code></td>
      <td><span class="label label-{% if s.status == 'ready' %}green{% else %}yellow{% endif %}">{{ s.status | escape }}</span></td>
      <td>{% if s.backed_by == 'culture' %}<code>culture</code>{% else %}<a href="https://github.com/agentculture/{{ s.backed_by | escape }}"><code>{{ s.backed_by | escape }}</code></a>{% endif %}</td>
      <td>{{ s.note | escape }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
