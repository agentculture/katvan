# SonarCloud project identity. Project must be registered on sonarcloud.io
# under the agentculture organization, and the SonarCloud GitHub App must
# be installed on this repo, before the scan will produce a quality gate.
sonar.projectKey=agentculture_katvan
sonar.organization=agentculture

# Katvan is currently a docs/skills repo — no Python package yet. Scan the
# whole repo; SonarCloud auto-detects shell, markdown, YAML. When a Python
# source dir lands, narrow sonar.sources and add sonar.python.coverage.reportPaths
# + sonar.python.version (see steward's sonar-project.properties for the shape).
sonar.sources=.

# Don't analyze noise.
sonar.exclusions=**/.venv/**,**/__pycache__/**,uv.lock,.agex/**
