# SonarCloud project identity. Project must be registered on sonarcloud.io
# under the agentculture organization, and the SonarCloud GitHub App must
# be installed on this repo, before the scan will produce a quality gate.
sonar.projectKey=agentculture_katvan
sonar.organization=agentculture

# katvan now ships the `katvan` Python package. The Sonar scan runs inside
# the Tests workflow (.github/workflows/tests.yml), fed by pytest coverage —
# the standalone sonarcloud.yml was removed once a real package landed.
# Analyse the package source; tests and coverage are wired in below.
sonar.sources=katvan
sonar.tests=tests
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# Don't analyze noise.
sonar.exclusions=**/.venv/**,**/__pycache__/**,uv.lock,.agex/**
